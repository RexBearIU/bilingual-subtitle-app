[package]
name = "app"
version = "0.1.0"
description = "Local realtime bilingual subtitle overlay — WASAPI loopback + faster-whisper ASR + Qwen3 translation"
authors = ["RexBearIU"]
license = "MIT"
repository = "https://github.com/RexBearIU/bilingual-subtitle-app"
edition = "2021"
rust-version = "1.77.2"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.6.2", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.11.2", features = ["tray-icon"] }
tauri-plugin-log = "2"
rubato = "0.15"
ureq = { version = "2", features = ["json"] }

# Windows-only: WASAPI loopback capture (ADR-0002).
[target.'cfg(target_os = "windows")'.dependencies]
wasapi = "0.14"

# Windows crate for Process Loopback API (Win 10 Build 20348 / Win 11+).
# wasapi 0.14 uses an older windows version internally; this co-exists fine
# as they are different semver-incompatible crate versions.
[target.'cfg(target_os = "windows")'.dependencies.windows]
version = "0.58"
features = [
  "implement",
  "Win32_Foundation",
  "Win32_Media_Audio",
  "Win32_Security",
  "Win32_System_Com",
  "Win32_System_Com_StructuredStorage",
  "Win32_System_Threading",
]

# windows-core is a direct dep so the code generated by #[implement] can resolve
# the `::windows_core::` path it emits internally.
[target.'cfg(target_os = "windows")'.dependencies.windows-core]
version = "0.58"

# Desktop-only: global hotkey escape hatch (Ctrl+Alt+P) to undo click-through.
[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-global-shortcut = "2"
